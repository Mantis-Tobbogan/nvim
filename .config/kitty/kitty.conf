# Font
font_family      CaskaydiaCove Nerd Font
bold_font        CaskaydiaCove Nerd Font
italic_font      CaskaydiaCove Nerd Font
bold_italic_font CaskaydiaCove Nerd Font Semibold Italic
font_size        11.5

# Window
window_padding_width 14
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
shell_integration enabled

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Allow remote access
single_instance yes
allow_remote_control yes

# Aesthetics
cursor_shape block
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Alt+nums for tab switches
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Current directory is launched with new tab and new window
map ctrl+shift+t launch --type=tab --cwd=current
map ctrl+shift+n launch --type=os-window --cwd=current


# Foreground and Background highlighting
# selection_background #44475a
# selection_foreground #f8f8f2
map shift+enter send_text all \e\r

# Colors - Dracula inspired
# foreground #f8f8f2
# background #282a36
# cursor #f8f8f2
# color0 #000000
# color1 #ff5555
# color2 #50fa7b
# color3 #f1fa8c
# color4 #bd93f9
# color5 #ff79c6
# color6 #8be9fd
# color7 #bfbfbf
# color8 #636e72
# color9 #ff5555
# color10 #50fa7b
# color11 #f1fa8c
# color12 #bd93f9
# color13 #ff79c6
# color14 #8be9fd
# color15 #f8f8f2


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME